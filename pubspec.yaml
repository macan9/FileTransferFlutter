name: file_transfer_flutter
description: A structured Flutter client scaffold for local transfer and private cloud style file management.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  device_info_plus: ^11.5.0
  desktop_drop: ^0.6.0
  flutter_riverpod: ^2.6.1
  flutter_webrtc: ^0.14.2
  go_router: ^16.0.0
  equatable: ^2.0.7
  file_picker: ^10.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  http: ^1.5.0
  intl: ^0.20.2
  open_filex: ^4.7.0
  path: ^1.9.1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
  socket_io_client: ^3.1.2
  uuid: ^4.5.1
  window_manager: ^0.5.1
  tray_manager:
    path: third_party/tray_manager

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - app_env.json
    - assets/icon/tray_icon.ico
    - assets/tray_menu/open.bmp
    - assets/tray_menu/network.bmp
    - assets/tray_menu/private.bmp
    - assets/tray_menu/transfer.bmp
    - assets/tray_menu/settings.bmp
    - assets/tray_menu/exit.bmp
