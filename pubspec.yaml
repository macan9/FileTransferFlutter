name: file_transfer_flutter
description: A structured Flutter client scaffold for local transfer and private cloud style file management.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  desktop_drop: ^0.6.0
  flutter_riverpod: ^2.6.1
  go_router: ^16.0.0
  equatable: ^2.0.7
  file_picker: ^10.3.2
  http: ^1.5.0
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  window_manager: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
